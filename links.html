<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAI Arquitetura | Links</title>
  <meta name="description" content="Links oficiais da KAI Arquitetura. Site, WhatsApp, portfólio e contato.">
  <link rel="icon" type="image/png" href="img/simbolo.png">
  <link rel="stylesheet" href="css/fonts.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #F7F5EF;
      --coral: #D87C65;
      --black: #1C1C1C;
      --beige: #D9CFC5;
      --beige-dark: #A89888;
      --peach: #F0BBA3;
      --white: #FFFFFF;
      --font: 'ClashDisplay', sans-serif;
    }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .links {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .links__logo {
      width: 160px;
      margin-bottom: 0.2rem;
    }

    .links__logo img {
      width: 100%;
      height: auto;
      display: block;
    }

    .links__tagline {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--beige-dark);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .links__btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.95rem 1.2rem;
      border-radius: 50px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .links__btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .links__btn:active {
      transform: translateY(0);
    }

    /* Coral filled */
    .links__btn--coral {
      background-color: var(--coral);
      color: var(--white);
    }

    /* Outlined */
    .links__btn--outline {
      background-color: transparent;
      color: var(--black);
      border: 1.5px solid var(--beige);
    }

    .links__btn--outline:hover {
      border-color: var(--coral);
      color: var(--coral);
    }

    /* WhatsApp */
    .links__btn--whatsapp {
      background-color: #25D366;
      color: var(--white);
    }

    /* Icon inside button */
    .links__btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .links__footer {
      margin-top: 1rem;
      font-size: 0.7rem;
      color: var(--beige-dark);
      letter-spacing: 0.05em;
    }

    .links__footer a {
      color: var(--coral);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="links">
    <div class="links__logo">
      <a href="index.html">
        <img src="img/logo.png" alt="KAI Arquitetura">

    </div>

    <p class="links__tagline">Arquitetura &amp; Interiores</p>

    <!-- Portfólio -->

    <p class="links__footer">kaiarquitetura.com.br</p>
  </div>

</body>
</html>
